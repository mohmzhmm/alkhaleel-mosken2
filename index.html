<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت مسجد الخليل</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: url('3.png') no-repeat center center fixed;
                      background-size: cover;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        #prayer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #004d00; z-index: 100; display: none; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .logo-container {
            position: fixed; bottom: 40px; right: 60px; text-align: center; z-index: 10;
        }
        .logo-img { width: 250px; filter: drop-shadow(0 0 10px rgba(0,0,0,1.5)); }
        .logo-text { display: block; font-size: 1rem; color: #ffca28; margin-top: 5px; }

        .header-top {
            width: 100%; display: flex; justify-content: space-around; 
            padding: 5px 0; background: rgba(0,0,0,0.3); font-size: 1.8rem; color: #ffffff;
                     backdrop-filter: blur(8px); 
                     -webkit-backdrop-filter: blur(12px); /* لدعم متصفحات آبل */

        /* تكبير الساعة */
        #clock{
            font-size: 4rem;
            font-weight: 700;
        }
        /* تصغير التاريخ */
        #date-ar,
        #date-en{
            font-size: 1.8rem;
            opacity: 0.9;
        }

        }
        /* حاوية المربعات الرئيسية */
              .prayer-cards-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: nowrap;
            margin: 30px auto;
            width: 95%;
    }

        /* تصميم المربع الواحد */
              .prayer-card {
            background: rgba(25, 35, 40, 0.5);
            border-radius: 15px;
            padding: 20px 10px;
            flex: 1; /* لتوزيع المساحة بالتساوي */
                      min-width: 150px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.0);
            backdrop-filter: blur(15px); /* تأثير التغبيش */
                     -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
    }

       .prayer-name { color: #ffffff; font-size: 1.8rem; font-weight: bold; margin-bottom: 2px; }
       .swedish-name { color: #aaa; font-size: 1.2rem; margin-bottom: 10px; text-transform: capitalize; }
       .prayer-time { color: #ffffff; font-size: 1.6rem; font-weight: bold; margin-bottom: 15px; }

       /* صندوق الإقامة الصغير */
            .iqama-box {
           background: rgba(255, 202, 40, 0.1); 
           border: 1px solid rgba(255, 202, 40, 0.3);
           padding: 10px 5px;
           border-radius: 10px;
           margin-top: auto; /* لدفعه لأسفل المربع */
    }

      .iqama-label { color: #ffca28; font-size: 0.8rem; display: block; opacity: 0.8; }
      .iqama-time { color: #ffca28; font-size: 1.2rem; font-weight: bold; }

      /* تمييز الصلاة القادمة (Active) */
      .active-card {
          border: 2px solid #ffca28 !important;
          box-shadow: 0 0 25px rgba(255, 202, 40, 0.5);
          transform: translateY(-10px); /* يرتفع قليلاً للأعلى */
                  background: rgba(40, 50, 55, 0.6) !important;
    }

       

        .countdown-time { 
                      font-size: 7rem; 
                      font-weight: bold; 
                      color: #ffca28; 
                      font-family: sans-serif;
                      text-shadow: 0 0 20px rgba(255, 202, 40, 0.3);
                        

        } /* وقت الصلاة في المستطيل */
        .swedish-text { display: block; font-size: 0.65em; color: #969fa3; margin-top: 4px; }

        .countdown-container {
            background: rgba(25, 35, 40, 0.5); /* نفس لون الـ cards */
            border: 2px solid rgba(255, 202, 40, 0); /* إطار ذهبي شفاف */
                      border-radius: 20px;
            padding: 15px 40px;
            text-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
            min-width: 1000px; /* لضمان عرض المستطيل */
                      transition: all 0.5s ease; }

               
        }

/* تنسيقات الجدول */
        .prayer-table th { 
            background-color: rgba(255,202,40,0.15); 
            color: #ffca28; 
            padding: 15px; 
            text-align: center; 
        }
        .prayer-table td { 
            padding: 2px; 
            text-align: center; 
            border-bottom: 1px solid #333; 
        }
        .active-row { 
            background-color: rgba(255, 202, 40, 0.4) !important; 
            font-weight: bold; 
                      /* إضافة إشعاع ذهبي حول الصف النشط */
                      box-shadow: inset 0 0 15px rgba(255, 202, 40, 1.5), 0 0 10px rgba(255, 202, 40, 1.3);
                   position: relative;
                   z-index: 1;
                      

        }
        
        /* تأثير الوميض */
        .iqama-blink { animation: blinker 2.8s infinite; }
        @keyframes blinker { 
            50% { background-color: rgba(1, 0, 0, 0.5); } 
        } /* تأكد من وجود هذا القوس */

        /* صورة أسفل منتصف الشاشة */
        .bottom-center-logo {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
        }
        .bottom-center-logo img {
            width: 1000px;
            height: auto;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        } /* تأكد من وجود هذا القوس */

        /* صورة أسفل يسار الشاشة */
        .bottom-left-logo {
            position: fixed;
            bottom: 40px;
            left: 60px;
            z-index: 5;
        }
        .bottom-left-logo img {
            width: 250px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(0,0,0,1.5));
        }
    </style>
</head>

            </div>
        </div>

        ];

        const iqamaOffsets = { Fajr: 10, Duhur: 10, Asr: 10, Maghrib: 5, Ishâ: 10 };
        const labels = { 
            Fajr: { ar: "الفجر", sv: "Fajr" }, 
            Duhur: { ar: "الظهر", sv: "Duhur" },
            Asr: { ar: "العصر", sv: "Asr" },
                      Maghrib: { ar: "المغرب", sv: "Maghrib" },
                      Ishâ: { ar: "العشاء", sv: "Ishâ" }
        };

        let nextPrayerNameGlobal = "";

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
            const optionsAr = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-ar').innerText = now.toLocaleDateString('ar-EG-u-nu-latn', optionsAr);
            document.getElementById('date-en').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // دالة لتحويل النص "12:09" وتاريخ "2026-02-16" إلى كائن وقت حقيقي
        function parseDateTime(dateObj, timeStr) {
            const [year, month, day] = dateObj.Datum.split(' ')[0].split('-');
            const [hours, minutes] = timeStr.split(':');
            return new Date(year, month - 1, day, hours, minutes, 0);
        }

        function getTodayData() {
            const now = new Date();
            const todayStr = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, '0') + "-" + String(now.getDate()).padStart(2, '0') + " 00:00:00";
            return prayerData.find(d => d.Datum === todayStr);
        }

        function renderTable() {
            const times = getTodayData();
            if (!times) return;

             // 1. تحديث أوقات الأذان والإقامة في كل مربع
           for (let key in labels) {
                // تحديث وقت الأذان (مثلاً: fajr-time)
               const timeElement = document.getElementById(`${key.toLowerCase()}-time`);
               if (timeElement) {
                 timeElement.innerText = times[key];
              }

                // تحديث وقت الإقامة (مثلاً: fajr-iqama)
              const iqamaElement = document.getElementById(`${key.toLowerCase()}-iqama`);
              if (iqamaElement) {
                    // الشروق ليس له إقامة
                  if (key === "Shuruq") {
                     iqamaElement.innerText = "-";
                  } else {
                        // استخدام دالة الحساب لإضافة الدقائق لوقت الأذان
                      iqamaElement.innerText = calculateIqamaTime(times[key], iqamaOffsets[key]);
                  }
              }

              // 2. تحديث المربع النشط (Active Card)
             const cardElement = document.getElementById(`card-${key.toLowerCase()}`);
             if (cardElement) {
                  // إزالة الكلاس القديم أولاً
             cardElement.classList.remove('active-card');
                 // إذا كان اسم الصلاة يطابق الصلاة القادمة عالمياً
               if (labels[key].ar === nextPrayerNameGlobal) {
                  cardElement.classList.add('active-card');
                }
            }
        }
    }

        // دالة إضافية ضرورية لحساب وقت الإقامة بدقة
        function calculateIqamaTime(timeStr, offsetMin) {
            if (!timeStr || timeStr === "-") return "-";
            const [hours, minutes] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(hours);
            date.setMinutes(minutes + offsetMin);
            return date.getHours().toString().padStart(2, '0') + ":" + 
                   date.getMinutes().toString().padStart(2, '0');
        }
        

        function updateTimer() {
            const now = new Date();
            let todayData = getTodayData();
            if (!todayData) return;

            const prayers = [
                {n: labels.Fajr.ar, t: todayData.Fajr, i: iqamaOffsets.Fajr, sv: labels.Fajr.sv, data: todayData},
                {n: labels.Duhur.ar, t: todayData.Duhur, i: iqamaOffsets.Duhur, sv: labels.Duhur.sv, data: todayData},
                {n: labels.Asr.ar, t: todayData.Asr, i: iqamaOffsets.Asr, sv: labels.Asr.sv, data: todayData},
                {n: labels.Maghrib.ar, t: todayData.Maghrib, i: iqamaOffsets.Maghrib, sv: labels.Maghrib.sv, data: todayData},
                {n: labels.Ishâ.ar, t: todayData.Ishâ, i: iqamaOffsets.Ishâ, sv: labels.Ishâ.sv, data: todayData}
            ];

            let target = null, nameAr = "", nameSv = "", mode = "";
            const overlay = document.getElementById('prayer-overlay');

            for (let p of prayers) {
                const pTime = parseDateTime(p.data, p.t);
                const iTime = new Date(pTime.getTime() + p.i * 60000);
                const endGreen = new Date(iTime.getTime() + 5 * 60000);

                if (now >= iTime && now < endGreen) { overlay.style.display = 'flex'; return; }
                if (now < pTime) { target = pTime; nameAr = p.n; nameSv = p.sv; mode = "اذان"; break; }
                if (now < iTime) { target = iTime; nameAr = p.n; nameSv = p.sv; mode = "اقامة"; break; }
            }

            // لو خلصنا صلوات اليوم، نبحث عن فجر بكرة
            if (!target) {
                const tomorrow = new Date();
                tomorrow.setDate(now.getDate() + 1);
                const tomorrowStr = tomorrow.getFullYear() + "-" + String(tomorrow.getMonth() + 1).padStart(2, '0') + "-" + String(tomorrow.getDate()).padStart(2, '0') + " 00:00:00";
                const tData = prayerData.find(d => d.Datum === tomorrowStr);
                if (tData) {
                    target = parseDateTime(tData, tData.Fajr);
                    nameAr = labels.Fajr.ar; nameSv = labels.Fajr.sv; mode = "اذان";
                }
            }

            overlay.style.display = 'none';
            if (target) {
                nextPrayerNameGlobal = nameAr;
                const diff = target - now;
                const hh = String(Math.floor(diff/3600000)).padStart(2, '0');
                const mm = String(Math.floor((diff%3600000)/60000)).padStart(2, '0');
                const ss = String(Math.floor((diff%60000)/1000)).padStart(2, '0');
                document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
                document.getElementById('timer-label').innerHTML = (mode === "اذان" ? "المتبقي للأذان" : "المتبقي للإقامة") + ` <span class="swedish-text">${mode === "اذان" ? "Tid till Adhan" : "Tid till Iqama"}</span>`;
                document.getElementById('timer-prayer-name').innerHTML = `${nameAr} <span class="swedish-text">${nameSv}</span>`;
                document.getElementById('timer-box').className = "countdown-container" + (mode === "اقامة" ? " iqama-blink" : "");
            }
        }

        setInterval(() => { updateClock(); updateTimer(); renderTable(); }, 1000);
        updateClock(); updateTimer(); renderTable();
    </script>
